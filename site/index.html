const C = {PASS:'var(--pass)',FAIL:'var(--fail)',PARTIAL:'var(--partial)'};

function setF(b){filter=b.dataset.f;document.querySelectorAll('.bar button').forEach(x=>x.classList.remove('active'));b.classList.add('active');render();}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function rate(btn,r){const a=btn.closest('.card').querySelector('audio'); if(a){a.playbackRate=r; if(a.paused) a.play();} btn.parentNode.querySelectorAll('button').forEach(x=>x.classList.remove('on')); btn.classList.add('on');}
function render(){

    return hay.includes(q);
  }).forEach(d=>{
    const col=C[d.verdict]||'var(--mut)';
